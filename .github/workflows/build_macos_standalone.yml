name: MacOS Intel Official 2026 - No Danmaku
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15-intel 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove Danmaku from Code
        run: |
          # 1. On retire la dépendance du Cargo.toml au cas où l'étape 1 a été oubliée
          sed -i '' '/danmakw/d' Cargo.toml
          
          # 2. On commente les appels dans le code source pour éviter les erreurs
          # On cherche les fichiers qui utilisent danmakw et on neutralise les lignes
          grep -rl "danmakw" src/ | xargs sed -i '' 's/^use danmakw/\/\/ use danmakw/g'
          
      - name: Install Dependencies
        run: |
          brew install gtk4 libadwaita mpv pkg-config dylibbundler gettext \
                       gstreamer gst-plugins-base gst-plugins-good gst-plugins-bad \
                       adwaita-icon-theme cairo pango atk
          rustup target add x86_64-apple-darwin

      - name: Build Tsukimi
        run: |
          export PKG_CONFIG_PATH="/usr/local/lib/pkgconfig:/usr/local/opt/libffi/lib/pkgconfig"
          export GETTEXT_DIR=$(brew --prefix gettext)
          # On compile sans danmakw
          cargo build --release --locked --target x86_64-apple-darwin

      - name: Bundle App
        run: |
          mkdir -p Tsukimi.app/Contents/MacOS
          mkdir -p Tsukimi.app/Contents/Resources/share/glib-2.0/schemas
          mkdir -p Tsukimi.app/Contents/Frameworks
          
          cp share/macos/Info.plist Tsukimi.app/Contents/
          cp share/macos/AppIcon.icns Tsukimi.app/Contents/Resources/
          cp target/x86_64-apple-darwin/release/tsukimi Tsukimi.app/Contents/MacOS/
          
          # Schémas GSettings
          cp $(brew --prefix gtk4)/share/glib-2.0/schemas/*.xml Tsukimi.app/Contents/Resources/share/glib-2.0/schemas/ || true
          glib-compile-schemas Tsukimi.app/Contents/Resources/share/glib-2.0/schemas/
          
          # Liaison des librairies
          dylibbundler -od -b \
            -x Tsukimi.app/Contents/MacOS/tsukimi \
            -d Tsukimi.app/Contents/Frameworks/ \
            -p @executable_path/../Frameworks/
          
          zip -r Tsukimi_Intel_Mac.zip Tsukimi.app

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Tsukimi-Intel-No-Danmaku
          path: Tsukimi_Intel_Mac.zip
