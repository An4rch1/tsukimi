name: MacOS CI Standalone (Cross-Compile Intel)
on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  build-release:
    # On utilise le runner le plus récent (M1/M2)
    runs-on: macos-latest 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          # On installe les librairies. Brew installera les versions ARM par défaut,
          # mais dylibbundler et le compilateur Rust s'occuperont du reste.
          brew install gtk4 libadwaita mpv pkg-config dylibbundler gettext
          
          # On ajoute explicitement la cible Intel pour Rust
          rustup target add x86_64-apple-darwin

      - name: Build for Intel
        run: |
          # On force la compilation vers l'architecture Intel (x86_64)
          cargo build --release --locked --target x86_64-apple-darwin

      - name: Make MacOS package & Bundle Libs
        run: |
          mkdir -p Tsukimi.app/Contents/MacOS
          mkdir -p Tsukimi.app/Contents/Resources
          mkdir -p Tsukimi.app/Contents/Frameworks
          
          cp share/macos/Info.plist Tsukimi.app/Contents/
          cp share/macos/AppIcon.icns Tsukimi.app/Contents/Resources/
          
          # On récupère le binaire qui a été généré dans le dossier x86_64
          cp target/x86_64-apple-darwin/release/tsukimi Tsukimi.app/Contents/MacOS/
          
          # dylibbundler va chercher les librairies Intel nécessaires.
          # Note : Si dylibbundler galère car brew est en ARM, il faudra peut-être
          # forcer brew à installer en x86_64, mais testons d'abord ainsi.
          dylibbundler -od -b \
            -x Tsukimi.app/Contents/MacOS/tsukimi \
            -d Tsukimi.app/Contents/Frameworks/ \
            -p @executable_path/../Frameworks/
          
          zip -r Tsukimi_Intel_Standalone.zip Tsukimi.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tsukimi-Intel-Mac
          path: Tsukimi_Intel_Standalone.zip
